<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bornes de Segurança de Elevadores</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #f4f6f9; 
            color: #333; 
            margin: 0; 
            padding: 15px;
            /* MARCA DE ÁGUA IMPEDIMENTO DE CÓPIA */
            background-image: url("data:image/svg+xml,%3Csvg xmlns='http://w3.org' width='160' height='100'%3E%3Ctext x='20' y='50' fill='rgba(0,0,0,0.03)' font-size='11' font-family='Arial' font-weight='bold' transform='rotate(-25 80 50)'%3ENelson 15035248%3C/text%3E%3C/svg%3E");
            background-repeat: repeat;
        }
        .container { max-width: 600px; background: rgba(255, 255, 255, 0.96); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: auto; text-align: center; }
        
        /* ÍCONE ILUSTRATIVO: ELEVADOR COM PASSAGEIROS */
        .elevator-passenger-icon { width: 70px; height: 70px; margin: 15px auto; display: flex; align-items: center; justify-content: center; background: #fff; border: 3px solid #d32f2f; border-radius: 8px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); position: relative; }
        
        h1 { color: #d32f2f; font-size: 20px; margin-bottom: 5px; margin-top: 10px; }
        p.subtitle { font-size: 13px; color: #666; margin-top: 0; margin-bottom: 25px; }
        
        /* Filtro Único Limpo */
        .filter-section { background: #eef2f7; padding: 20px; border-radius: 6px; margin-bottom: 20px; box-sizing: border-box; }
        label { font-weight: bold; display: block; margin-bottom: 10px; font-size: 15px; color: #333; }
        select { width: 100%; padding: 12px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; max-width: 350px; background: white; color: black; font-weight: bold; }
        optgroup { font-weight: bold; color: #0d47a1; background: #f0f4f8; }
        option { font-weight: normal; color: black; background: white; }

        .footer { text-align: center; margin-top: 30px; font-size: 11px; color: #777; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <!-- Novo Ícone Explicativo: Cabina com Passageiros -->
    <div class="elevator-passenger-icon">
        <svg xmlns="http://w3.org" viewBox="0 0 64 64" width="55" height="55">
            <!-- Cabo de Tração Superior -->
            <line x1="32" y1="0" x2="32" y2="10" stroke="#666" stroke-width="2.5" />
            <!-- Estrutura da Cabina (Teto e Chão Internos) -->
            <line x1="12" y1="12" x2="52" y2="12" stroke="#d32f2f" stroke-width="2" />
            <line x1="12" y1="52" x2="52" y2="52" stroke="#d32f2f" stroke-width="2" />
            
            <!-- Passageiro 1 (Esquerda) -->
            <circle cx="24" cy="24" r="5" fill="#333" />
            <path d="M14,44 C14,35 34,35 34,44 Z" fill="#333" />
            
            <!-- Passageiro 2 (Direita) -->
            <circle cx="40" cy="26" r="4.5" fill="#555" />
            <path d="M31,44 C31,36 49,36 49,44 Z" fill="#555" />

            <!-- Setas de Movimento Laterais (Subida e Descida discretas) -->
            <path d="M 6,24 L 6,14 L 3,18 M 6,14 L 9,18" stroke="#4caf50" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M 58,36 L 58,46 L 55,42 M 58,46 L 61,42" stroke="#0d47a1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
    </div>

    <h1>Bornes dos Circuitos de Segurança</h1>
    <p class="subtitle">Guia Técnico Personalizado — Elevadores em Portugal</p>
    
    <div class="filter-section">
        <label for="manobraSelect">Selecione o Fabricante e Modelo:</label>
        <select id="manobraSelect" onchange="irParaManobra()">
            <option value="">-- Escolha uma Manobra --</option>
            
            <optgroup label="Otis">
                <option value="otis-mcs220.html">MCS220</option>
                <option value="otis-ne300.html">NE300</option>
            </optgroup>
            
            <optgroup label="ThyssenKrupp (TKE)">
               <option value="tke-cmcc.html">CMC</option>
                <option value="tke-cmc4plus.html">CMC4+ 20.50</option>
                <option value="thyssen-serieb.html">Série B</option>
                <option value="thyssen-serief.html">Série F Monoplaca</option>
                <option value="thyssen-seriek.html">Série K</option>
                <option value="thyssen-tk10.html">TK10</option>
            </optgroup>
        </select>
    </div>

    <div class="footer">
        © Nelson 15035248 • Base de dados móvel privada
    </div>
</div>

<script>
function irParaManobra() {
    var urlDestino = document.getElementById('manobraSelect').value;
    if (urlDestino) {
        window.location.href = urlDestino;
    }
}
</script>

</body>
</html>
